services:
  portal-backend:
    #image: 192.168.106.8:6082/dataelement/shougang-portal-backend:master
    build:
      context: .
      dockerfile: deploy/Dockerfile_ali.portal-backend
    image: portal-backend:local
    container_name: shougang-portal-backend
    restart: unless-stopped
    environment:
      PORTAL_APP_ENV: production
      PORTAL_BISHENG_BASE_URL: ${PORTAL_BISHENG_BASE_URL:-http://127.0.0.1:7860}
      PORTAL_BISHENG_TIMEOUT_SECONDS: ${PORTAL_BISHENG_TIMEOUT_SECONDS:-30}
      PORTAL_BISHENG_API_TOKEN: ${PORTAL_BISHENG_API_TOKEN:-}
      PORTAL_BISHENG_DEFAULT_MODEL: ${PORTAL_BISHENG_DEFAULT_MODEL:-}
      PORTAL_BISHENG_PAGE_SIZE_LIMIT: ${PORTAL_BISHENG_PAGE_SIZE_LIMIT:-100}
    ports:
      - "${PORTAL_BACKEND_PORT:-8010}:8010"
    volumes:
      - ./portal-data:/app/app/config/data
    networks:
      portal:
        aliases:
          - backend

  portal-frontend:
    #image: 192.168.106.8:6082/dataelement/shougang-portal-frontend:master
    build:
      context: .
      dockerfile: deploy/Dockerfile.portal-frontend
    image: portal-frontend:local
    container_name: shougang-portal-frontend
    restart: unless-stopped
    depends_on:
      - portal-backend
    environment:
      BISHENG_WEB_UPSTREAM: ${BISHENG_WEB_UPSTREAM:-http://127.0.0.1:3001}
      BISHENG_API_UPSTREAM: ${BISHENG_API_UPSTREAM:-http://127.0.0.1:7860}
      BISHENG_MINIO_UPSTREAM: ${BISHENG_MINIO_UPSTREAM:-http://192.168.106.171:9100}
      BISHENG_MINIO_SIGNED_HOST: ${BISHENG_MINIO_SIGNED_HOST:-minio:9000}
    ports:
      - "${PORTAL_FRONTEND_PORT:-3002}:80"
    networks:
      - portal
      
networks:
  portal:
    name: shougang-portal
