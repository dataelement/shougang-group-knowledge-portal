kind: pipeline
type: docker
name: cicd

clone:
  disable: true

steps:
  - name: clone
    image: alpine/git
    pull: if-not-exists
    environment:
      http_proxy:
        from_secret: PROXY
      https_proxy:
        from_secret: PROXY
    commands:
      - 'git config --global http.version HTTP/1.1'
      - 'git config --global core.compression 0'
      - 'git clone https://github.com/dataelement/shougang-group-knowledge-portal.git .'
      - 'git checkout $DRONE_COMMIT'

  - name: build_backend
    image: docker:24.0.6
    pull: if-not-exists
    privileged: true
    volumes:
      - name: socket
        path: /var/run/docker.sock
    environment:
      http_proxy:
        from_secret: PROXY
      https_proxy:
        from_secret: PROXY
      no_proxy: 192.168.106.8
      DOCKER_REGISTRY: http://192.168.106.8:6082
      DOCKER_REPO: 192.168.106.8:6082/dataelement/shougang-portal-backend
      DOCKER_USER:
        from_secret: NEXUS_USER
      DOCKER_PASSWORD:
        from_secret: NEXUS_PASSWORD
    commands:
      - 'VERSION=master'
      - 'echo "======= build backend ======="'
      - 'echo "当前版本: $VERSION"'
      - 'echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin $DOCKER_REGISTRY'
      - 'docker build --build-arg http_proxy=$http_proxy --build-arg https_proxy=$https_proxy -f deploy/Dockerfile.portal-backend -t $DOCKER_REPO:$VERSION .'
      - 'docker push $DOCKER_REPO:$VERSION'

  - name: build_frontend
    image: docker:24.0.6
    pull: if-not-exists
    privileged: true
    volumes:
      - name: socket
        path: /var/run/docker.sock
    environment:
      http_proxy:
        from_secret: PROXY
      https_proxy:
        from_secret: PROXY
      no_proxy: 192.168.106.8
      DOCKER_REGISTRY: http://192.168.106.8:6082
      DOCKER_REPO: 192.168.106.8:6082/dataelement/shougang-portal-frontend
      DOCKER_USER:
        from_secret: NEXUS_USER
      DOCKER_PASSWORD:
        from_secret: NEXUS_PASSWORD
    commands:
      - 'VERSION=master'
      - 'echo "======= build frontend ======="'
      - 'echo "当前版本: $VERSION"'
      - 'echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin $DOCKER_REGISTRY'
      - 'docker build --build-arg http_proxy=$http_proxy --build-arg https_proxy=$https_proxy -f deploy/Dockerfile.portal-frontend -t $DOCKER_REPO:$VERSION .'
      - 'docker push $DOCKER_REPO:$VERSION'

  - name: deploy
    image: appleboy/drone-ssh
    pull: if-not-exists
    environment:
      NEXUS_USER:
        from_secret: NEXUS_USER
      NEXUS_PASSWORD:
        from_secret: NEXUS_PASSWORD
    settings:
      host: 192.168.106.171
      username: root
      password:
        from_secret: sshpwd
      port: 22
      command_timeout: 20m
      envs:
        - NEXUS_USER
        - NEXUS_PASSWORD
      script: |
        set -e

        echo "======= deploy shougang group knowledge portal ======="

        export https_proxy=http://118.195.232.223:39995
        export http_proxy=http://118.195.232.223:39995
        export all_proxy=socks5://118.195.232.223:39995
        export no_proxy=192.168.106.8,192.168.106.171,localhost,127.0.0.1

        REMOTE_DIR=/opt/code/shougang-group-knowledge-portal
        REPO_URL=https://github.com/dataelement/shougang-group-knowledge-portal.git

        if [ ! -d "$REMOTE_DIR" ]; then
          echo "======= clone portal repo ======="
          mkdir -p "$(dirname "$REMOTE_DIR")"
          git clone "$REPO_URL" "$REMOTE_DIR"
        elif [ ! -d "$REMOTE_DIR/.git" ]; then
          echo "远端目录已存在但不是 Git 仓库: $REMOTE_DIR"
          exit 1
        else
          echo "======= update portal repo ======="
          cd "$REMOTE_DIR"
          git fetch origin master
          git checkout master
          git pull --ff-only origin master
        fi

        cd "$REMOTE_DIR"

        echo "======= login docker registry ======="
        echo "$NEXUS_PASSWORD" | docker login 192.168.106.8:6082 -u "$NEXUS_USER" --password-stdin

        echo "======= pull portal images ======="
        docker compose pull portal-backend portal-frontend

        echo "======= restart portal services ======="
        docker compose up -d portal-backend portal-frontend

        echo "======= portal compose status ======="
        docker compose ps

  - name: notify_result
    image: plugins/webhook
    pull: if-not-exists
    settings:
      debug: true
      urls:
        from_secret: FEISHU_URL
      content_type: application/json
      template: |
        {
          "msg_type": "interactive",
          "card": {
            "type": "template",
            "data": {
              "template_id": "AAqkI9bnY5FUs",
              "template_variable": {
                "repo_name": "{{ repo.name }}",
                "build_branch": "{{ build.branch }}",
                "build_author": "{{ DRONE_COMMIT_AUTHOR }}",
                "link": "{{ build.link }}",
                "commit_msg": "{{ trim build.message }}",
                "status": "{{ build.status }}"
              }
            }
          }
        }
    failure: ignore
    when:
      status:
        - success
        - failure

trigger:
  branch:
    - master
  event:
    - push

volumes:
  - name: socket
    host:
      path: /var/run/docker.sock
